# Enable mouse support (click to select panes/windows)
set -g mouse on

# Use vi mode for copy mode (easier for vim users)
setw -g mode-keys vi

# Change prefix from Ctrl+b to Ctrl+a (like GNU screen)
set -g prefix M-q
unbind C-b
bind M-q send-prefix

# Reload config without restarting tmux: Ctrl+b then :
# type: source-file ~/.tmux.conf
set -g default-shell /bin/zsh

# Use wl-copy to bridge tmux with the system clipboard (Wayland)
set -s copy-command 'wl-copy'

# Specific bindings for Vi mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'
